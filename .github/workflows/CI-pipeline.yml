name: ci-pipeline

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
    test:
      runs-on: [self-hosted ,Linux]

      steps:
        - name: checkout code
          uses: actions/checkout@v6

        - name: node modules install and test 
          run: |
            npm i
            npm test


    build:
      needs: test
      runs-on: [self-hosted ,Linux]
      if: ${{ needs.test.result == 'passed' }}

      steps:
        - name: checkout code
          uses: actions/checkout@v6

        - name: build app.js 
          run: npm build
      
        
      
 
  
